<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>老師專區｜TIPS 英典教育</title>
<meta content="noindex,nofollow" name="robots"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<style>
  :root{--ink:#1D2533;--gold:#F5A623;--cream:#F4F1EA;--green:#06C755;--lead:#566173;--muted:#8693A6;}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--cream);color:var(--ink);
    font-family:"Noto Sans TC",-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif;
    display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
  header{padding:20px 24px;border-bottom:1px solid rgba(29,37,51,.08)}
  .brand{display:inline-flex;align-items:center;text-decoration:none;color:var(--ink)}
  .brand .word{font-weight:800;font-size:1.18rem;letter-spacing:.5px;line-height:1.1}
  .brand .word small{display:block;font-weight:500;font-size:.62rem;letter-spacing:2px;color:var(--gold)}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px 60px;text-align:center}
  .badge{display:inline-block;background:rgba(245,166,35,.14);color:var(--gold);font-size:.8rem;font-weight:700;padding:4px 14px;border-radius:999px;letter-spacing:2px}
  h1{font-size:1.8rem;font-weight:800;margin:16px 0 6px}
  .sub{color:var(--lead);font-size:1rem;margin:0 0 34px}
  .card{width:100%;max-width:440px;display:flex;flex-direction:column;gap:16px}
  .sys-btn{display:flex;align-items:center;gap:14px;text-decoration:none;background:#fff;border:1.5px solid rgba(29,37,51,.1);
    border-radius:14px;padding:20px 22px;color:var(--ink);font-weight:700;font-size:1.05rem;text-align:left;
    box-shadow:0 14px 34px -28px rgba(29,37,51,.6);transition:.15s}
  .sys-btn:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 18px 40px -26px rgba(245,166,35,.7)}
  .sys-btn .ico{flex:none;width:46px;height:46px;border-radius:12px;background:var(--gold);color:#1a1205;
    display:inline-flex;align-items:center;justify-content:center;font-size:22px}
  .sys-btn .txt{display:flex;flex-direction:column;line-height:1.35}
  .sys-btn .txt small{color:var(--muted);font-size:.8rem;font-weight:500;margin-top:2px}
  .sys-btn .arrow{margin-left:auto;color:var(--muted);font-size:1.2rem}
  footer{color:var(--muted);font-size:.82rem;text-align:center;padding:20px 24px 30px}
</style>
</head>
<body>
<header>
<a class="brand" href="/"><span class="word">TIPS 英典教育<small>KNOWLEDGE CORE</small></span></a>
</header>
<main>
<span class="badge">老師專區</span>
<h1>教學系統入口</h1>
<p class="sub">請選擇要登入的系統</p>
<div class="card">
<a class="sys-btn" href="https://system.tips-edu.com/login" target="_blank" rel="noopener noreferrer">
<span class="ico">🎓</span>
<span class="txt">TIPS英典教育管理系統<small>學生管理・課務・進度</small></span>
<span class="arrow">→</span>
</a>
</div>
</main>
<footer>© 2026 TIPS 英典教育 · 僅供教職員使用</footer>
</body>
</html>
