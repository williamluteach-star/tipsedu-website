name: Weekly TIPS Blog Article

on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate next article
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-article.mjs

      - name: Open Pull Request
        if: steps.gen.outputs.status == 'created'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          branch: blog/${{ steps.gen.outputs.slug }}
          add-paths: blog/*.html
          commit-message: "新增部落格文章：${{ steps.gen.outputs.title }}"
          title: "📝 新文章草稿：${{ steps.gen.outputs.title }}"
          body: |
            這是自動產出的部落格文章草稿，請檢查內容是否正確。
            確認無誤後按 Merge 即可發佈。
            - 標題：${{ steps.gen.outputs.title }}
            - 主關鍵字：${{ steps.gen.outputs.keyword }}
            - 發佈後網址：${{ steps.gen.outputs.url }}

      - name: Email notification
        if: steps.gen.outputs.status == 'created'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: TIPS Blog Bot <${{ secrets.MAIL_USERNAME }}>
          to: williamluteach@gmail.com
          subject: "📝 新部落格文章草稿：${{ steps.gen.outputs.title }}"
          body: |
            新文章已自動產出，等你確認發佈：
            標題：${{ steps.gen.outputs.title }}
            發佈後網址：${{ steps.gen.outputs.url }}
            請打開這個 Pull Request 檢查，確認無誤後按 Merge 發佈：
            ${{ steps.cpr.outputs.pull-request-url }}

      - name: All done note
        if: steps.gen.outputs.status == 'done'
        run: echo "內容佇列已全部產出完畢。"
