<head>

<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif; background:#faf7f4; color:#1d1d1f; line-height:1.7; -webkit-font-smoothing:antialiased; font-size:15px;}
  .panel{max-width:860px; margin:18px auto; background:#fff; border-radius:20px; padding:24px 28px; box-shadow:0 4px 24px rgba(60,50,70,.07);}

  .hint{font-size:.78rem; color:#6e6e73; margin-top:6px;}

  .btn:hover{filter:brightness(1.3);}
  .btn.sec{background:#ececf0; color:#1d1d1f;}
  .out{max-width:860px; margin:0 auto 60px;}
  .tierbox{background:#fff; border-radius:20px; padding:20px 24px; margin-top:14px; box-shadow:0 4px 24px rgba(60,50,70,.06);}

  .dcard{border-radius:14px; padding:11px 14px; margin:8px 0; font-size:.83rem;}

  .badge{display:inline-block; background:#fdf6e4; color:#a8790a; border-radius:980px; padding:2px 12px; font-size:.72rem; font-weight:700; margin-left:8px;}
  @media print{ body{background:#fff;} .panel{box-shadow:none;} .btn{display:none;} .tierbox{box-shadow:none; border:1px solid #ddd;} }
  @media (max-width:640px){ .grid6{grid-template-columns:repeat(3,1fr);} }
</style>
</head>
<body>
<div class="panel">
  <h1>📊 TIPS 學測落點分析 <span class="badge">申請 41 校系・分發全量 1772 系組</span><a href="../" style="float:right; font-size:.75rem; color:#5b8fd8; text-decoration:none;">← 回報告產生器</a></h1>
  <p class="hint">輸入學測級分（沒考的科目留空），系統依 114 學年甄選會官方「各校系篩選標準一覽表」判定：🔥 夢幻（差 2～4 級分內，值得衝）｜🎯 落點（±1 級分）｜🛡 安全（超過 2 級分以上）。</p>
  <div class="grid6">
    <div class="fld"><label>國文</label><input id="s國" type="number" min="0" max="15" placeholder="－"></div>
    <div class="fld"><label>英文</label><input id="s英" type="number" min="0" max="15" placeholder="－"></div>
    <div class="fld"><label>數學A</label><input id="s數A" type="number" min="0" max="15" placeholder="－"></div>
    <div class="fld"><label>數學B</label><input id="s數B" type="number" min="0" max="15" placeholder="－"></div>
    <div class="fld"><label>社會</label><input id="s社" type="number" min="0" max="15" placeholder="－"></div>
    <div class="fld"><label>自然</label><input id="s自" type="number" min="0" max="15" placeholder="－"></div>
  </div>
  <div id="distFields" style="display:none;">
    <p class="hint" style="margin-top:2px;">分科測驗級分（60 級分制，沒考的留空；學測級分系統會自動 ×4 換算）</p>
    <div class="grid6" style="grid-template-columns:repeat(8,1fr);">
      <div class="fld"><label>數甲</label><input id="d數甲" type="number" min="0" max="60" placeholder="－"></div>
      <div class="fld"><label>數乙</label><input id="d數乙" type="number" min="0" max="60" placeholder="－"></div>
      <div class="fld"><label>物理</label><input id="d物" type="number" min="0" max="60" placeholder="－"></div>
      <div class="fld"><label>化學</label><input id="d化" type="number" min="0" max="60" placeholder="－"></div>
      <div class="fld"><label>生物</label><input id="d生" type="number" min="0" max="60" placeholder="－"></div>
      <div class="fld"><label>歷史</label><input id="d歷" type="number" min="0" max="60" placeholder="－"></div>
      <div class="fld"><label>地理</label><input id="d地" type="number" min="0" max="60" placeholder="－"></div>
      <div class="fld"><label>公民</label><input id="d公" type="number" min="0" max="60" placeholder="－"></div>
    </div>
    <div class="fld" style="max-width:280px; margin-bottom:10px;"><label>校系關鍵字過濾（選填，例：台大、資訊、中興）</label><input id="dFilter" type="text" placeholder="留空＝全部"></div>
  </div>
  <div style="margin:4px 0 10px;">
    <label style="font-size:.85rem; font-weight:700; margin-right:14px;"><input type="radio" name="ldmode" value="apply" checked> 申請入學一階（學測）</label>
    <label style="font-size:.85rem; font-weight:700;"><input type="radio" name="ldmode" value="dist"> 分發入學（學測＋分科）</label>
  </div>
  <button class="btn" onclick="go()">產生落點分析</button>
  <button class="btn sec" onclick="window.print()">🖨 列印</button>
  <script>document.addEventListener("change",e=>{ if(e.target.name==="ldmode") document.getElementById("distFields").style.display = e.target.value==="dist"?"block":"none"; });</script>
</div>
<div class="out" id="out"></div>

<script src="data114.js"></script>
<script>
/* 114 學測五標（大考中心）：頂/前/均/後/底 */
const FIVE={"國":[13,12,10,9,7],"英":[13,11,8,4,3],"數A":[11,9,6,4,3],"數B":[12,10,6,4,3],"社":[13,12,10,8,7],"自":[13,12,9,7,5]};
const LVL={"頂":0,"前":1,"均":2,"後":3,"底":4};
/* 內建備援樣本（data114.js 未載入時使用） */
const DEPTS_BUILTIN=[
 {u:"國立臺灣大學",d:"電機工程學系",chk:{"英":"頂","數A":"頂","自":"頂"},sv:[[["英","數A","自"],44]]},
 {u:"國立臺灣大學",d:"法律學系法學組",chk:{"國":"頂","英":"頂","數B":"前","社":"頂"},sv:[[["國","英"],30]]},
 {u:"國立臺灣大學",d:"機械工程學系",chk:{"英":"均","數A":"前","自":"前"},sv:[[["英","數A","自"],41]]},
 {u:"國立臺灣大學",d:"土木工程學系",chk:{"國":"均","英":"均","數A":"均","自":"均"},sv:[[["國","英","數A","自"],51]]},
 {u:"國立臺灣大學",d:"護理學系",chk:{"國":"均","英":"均","數A":"均","自":"均"},sv:[[["英"],12],[["自"],13]]},
 {u:"國立臺灣大學",d:"物理治療學系",chk:{"國":"均","英":"均","數A":"均","自":"均"},sv:[[["英","數A","自"],41]]},
 {u:"國立臺灣大學",d:"藥學系",chk:{"國":"均","英":"均"},sv:[[["數A","自"],28],[["國","英"],27]]},
 {u:"國立臺灣大學",d:"外國語文學系",chk:{"國":"前","英":"頂","社":"前"},chkAny:[["數A","數B"],"均"],sv:[[["英"],15]]},
 {u:"國立中興大學",d:"財務金融學系",chk:{"國":"均","英":"前","數A":"均"},sv:[[["國","英","數A","社"],45],[["數A"],8],[["英"],14]]},
 {u:"國立中興大學",d:"資訊管理學系",chk:{"國":"均","英":"前","數A":"前","自":"均"},sv:[[["國","英","自"],34],[["數A"],12]]},
 {u:"國立中興大學",d:"法律學系",chk:{"國":"均","英":"均","數B":"均","社":"前"},sv:[[["英"],13],[["國"],13],[["社"],14]]},
 {u:"國立中興大學",d:"機械工程學系",chk:{"英":"均","數A":"均","自":"均"},sv:[[["英"],11],[["數A","自"],24]]},
 {u:"國立中興大學",d:"企業管理學系",chk:{"英":"前","數B":"前"},sv:[[["英"],11],[["數B"],10],[["國","社"],25]]},
 {u:"國立中興大學",d:"外國語文學系",chk:{"國":"均","英":"前"},sv:[[["國"],11],[["英"],14]]},
 {u:"國立中興大學",d:"會計學系",chk:{"國":"均","英":"均","數A":"均","社":"均"},sv:[[["國","英","數A","社"],43],[["社"],13],[["英"],12]]},
 {u:"國立中興大學",d:"化學系",chk:{"英":"均","數A":"均","自":"均"},sv:[[["英"],10],[["數A"],11],[["自"],13]]},
 {u:"國立中興大學",d:"土木工程學系",chk:{"英":"均","數A":"均","自":"均"},sv:[[["數A","自"],21],[["英","數A","自"],34]]},
 {u:"逢甲大學",d:"機械與電腦輔助工程學系",chk:{"自":"後"},sv:[[["國","數A","自"],28]]},
 {u:"逢甲大學",d:"化學工程學系",chk:{"英":"後","自":"後"},sv:[[["國","英","數A","自"],38]]},
 {u:"逢甲大學",d:"光電科學與工程學系",chk:{"英":"後","數A":"後"},sv:[[["國","英","數A","自"],37]]},
 {u:"逢甲大學",d:"會計學系",chk:{"英":"後","社":"後"},sv:[[["社"],10],[["英"],7]]},
 {u:"逢甲大學",d:"國際經營與貿易學系",chk:{"英":"後","數B":"後"},sv:[[["國","英","數B","社"],32]]},
 {u:"逢甲大學",d:"經濟學系",chk:{"英":"後","數B":"後"},sv:[[["數B"],6],[["社"],11]]}
];
function techBlock(S){
  if(typeof LD_TECH==="undefined") return "";
  const t={safe:[],match:[],dream:[]}; let noinfo=0;
  LD_TECH.forEach(D=>{
    if(!D.s){noinfo++;return;}
    let sum=0, ok=true;
    const hasA=D.s.includes("數A"), hasB=D.s.includes("數B");
    for(const sub of D.s){ if(sub==="數A"||sub==="數B") continue; if(S[sub]===null){ok=false;break;} sum+=S[sub]; }
    if(ok&&(hasA||hasB)){ const mv=Math.max(hasA&&S["數A"]!==null?S["數A"]:-1, hasB&&S["數B"]!==null?S["數B"]:-1); if(mv<0) ok=false; else sum+=mv; }
    if(!ok) return;
    const pct=sum/(15*D.n)*100;
    const dg=Math.round((pct-D.m)/100*15*10)/10; // 平均每科級分差
    const card={u:D.u,d:D.d,st:`參採 ${D.s.join("、")}（等權重）｜我的換算 ${Math.round(pct*100)/100}％／去年門檻 ${D.m}％（平均每科差 ${dg>=0?"+":""}${dg} 級分）`,df:dg};
    if(dg>=2) t.safe.push(card); else if(dg>=-1) t.match.push(card); else if(dg>=-4) t.dream.push(card);
  });
  const mk=(arr,color,bg)=>{arr.sort((a,b)=>a.df-b.df);return arr.map(c=>`<div class="dcard" style="background:${bg};"><span class="diff" style="color:${color};">${c.df>=0?"+":""}${c.df}</span><b>${c.u}　${c.d}</b><div class="st">${c.st}</div></div>`).join("");};
  const total=t.safe.length+t.match.length+t.dream.length;
  if(!total) return `<div class="tierbox"><h2>🏫 四技申請（科大）</h2><p style="font-size:.82rem; color:#6e6e73;">依目前輸入科目，沒有符合三級帶的科大校系。</p></div>`;
  return `<div class="tierbox"><h2>🏫 四技申請（科大）——同一份學測的第二條路</h2>
    ${t.dream.length?`<p style="font-size:.85rem; font-weight:700; color:#c9526f; margin-top:6px;">🔥 夢幻</p>`+mk(t.dream,"#c9526f","#fdeef1"):""}
    ${t.match.length?`<p style="font-size:.85rem; font-weight:700; color:#2f8f6d; margin-top:6px;">🎯 落點</p>`+mk(t.match,"#2f8f6d","#e8f5ee"):""}
    ${t.safe.length?`<p style="font-size:.85rem; font-weight:700; color:#3d7fc1; margin-top:6px;">🛡 安全</p>`+mk(t.safe,"#3d7fc1","#eaf3fb"):""}
    <p style="font-size:.7rem; color:#5b6478; margin-top:6px;">資料：技專校院招生策略委員會 114 四技申請一階最低篩選標準（全量 602 系）＋ 15 所重點科大參採科目（台科、北科、雲科、虎尾、勤益、台中科大與台中在地私立科大）。僅列「等權重可精確驗算」之 102 系；含加權或參採未確認者不列入分級，可口頭查簡章確認。</p></div>`;
}
function go(){
  const m=document.querySelector('input[name="ldmode"]:checked').value;
  if(m==="dist") runDist(); else run();
}
function runDist(){
  if(typeof LD_DIST==="undefined"){ document.getElementById("out").innerHTML='<div class="tierbox"><p style="font-size:.85rem;">找不到資料檔 data114.js——請確認已上傳至 luodian 資料夾。</p></div>'; return; }
  const G={}; ["國","英","數A","數B"].forEach(k=>{const v=document.getElementById("s"+k).value; G[k]=v===""?null:Number(v)*4;});
  const F={}; ["數甲","數乙","物","化","生","歷","地","公"].forEach(k=>{const v=document.getElementById("d"+k).value; F[k]=v===""?null:Number(v);});
  const SC={...G,...F};
  const kw=(document.getElementById("dFilter").value||"").trim();
  const tiers={safe:[],match:[],dream:[]}; let far=0, missing=0;
  LD_DIST.forEach(D=>{
    if(kw && !(D.u+D.d).includes(kw)) return;
    let total=0, tw=0, ok=true;
    for(const [subj,w] of D.w){ if(SC[subj]===null||SC[subj]===undefined){ok=false;break;} total+=SC[subj]*w; tw+=w; }
    if(!ok){missing++;return;}
    const dn=(total-D.m)/tw; // 每加權單位差距（60 分制；4 分≈1 學測級分）
    const card={...D, total:Math.round(total*100)/100, dn:Math.round(dn*10)/10};
    if(dn>=8) tiers.safe.push(card);
    else if(dn>=-4) tiers.match.push(card);
    else if(dn>=-16) tiers.dream.push(card);
    else far++;
  });
  const CAP=30;
  const box=(title,emoji,color,bg,arr,desc)=>{
    arr.sort((a,b)=>a.dn-b.dn);
    const shown=arr.slice(0,CAP);
    const cards=shown.length?shown.map(c=>`<div class="dcard" style="background:${bg};"><span class="diff" style="color:${color};">${c.dn>=0?"+":""}${c.dn}</span><b>${c.u}　${c.d}</b><div class="st">採計：${c.w.map(x=>x[0]+"×"+x[1]).join(" ")}｜我的加權總分 ${c.total}／去年最低 ${c.m}（差距為每加權科平均，4 分≈1 學測級分）</div></div>`).join(""):`<p style="font-size:.82rem; color:#6e6e73;">此帶沒有符合的校系${kw?"（過濾中："+kw+"）":""}。</p>`;
    const more=arr.length>CAP?`<p style="font-size:.75rem; color:#6e6e73;">另有 ${arr.length-CAP} 個未顯示——用關鍵字過濾縮小範圍。</p>`:"";
    return `<div class="tierbox"><h2 style="color:${color};">${emoji} ${title}<span style="font-weight:500; font-size:.78rem; color:#6e6e73;">　${desc}</span></h2>${cards}${more}</div>`;
  };
  document.getElementById("out").innerHTML=
    box("夢幻志向","🔥","#c9526f","#fdeef1",tiers.dream,"每科平均差 1～4 級分——值得衝")+
    box("落點志向","🎯","#2f8f6d","#e8f5ee",tiers.match,"每科平均 ±1 級分——主力戰場")+
    box("安全志向","🛡","#3d7fc1","#eaf3fb",tiers.safe,"每科平均超過 2 級分——保心安的底")+
    `<p class="miss">資料庫共 ${LD_DIST.length} 個系組（61 所大學，114 學年分發入學官方全量）；${missing} 個因缺考採計科目未列入、${far} 個差距過大未列出。</p>
     <div class="note">📌 資料來源：大學分發入學委員會 114 學年度「各系組最低錄取標準及錄取人數一覽表」官方文件全量解析。學測級分依官方規則 ×4 換算為 60 分制。以「去年」標準比對「今年」成績，各年難度與名額不同，結果為<b>選填參考，非錄取保證</b>；術科、英聽檢定與特種生名額未納入。🔒 內部工具，請勿外流網址。</div>`;
  document.title="學測落點分析_分發_"+new Date().toLocaleDateString("zh-TW").replace(/[/]/g,"");
}
function run(){
  const S={};
  ["國","英","數A","數B","社","自"].forEach(k=>{const v=document.getElementById("s"+k).value; S[k]=v===""?null:Number(v);});
  const tiers={safe:[],match:[],dream:[]};
  let far=0, blocked=0;
  const POOL=(typeof LD_APPLY!=="undefined")?LD_APPLY:DEPTS_BUILTIN;
  POOL.forEach(D=>{
    // 檢定
    let chkFail=null;
    for(const [subj,lv] of Object.entries(D.chk||{})){
      if(S[subj]===null){chkFail=`未考${subj}`;break;}
      if(S[subj]<FIVE[subj][LVL[lv]]){chkFail=`${subj}未達${lv}標`;break;}
    }
    if(!chkFail && D.chkAny){
      const [subjs,lv]=D.chkAny;
      if(!subjs.some(s=>S[s]!==null && S[s]>=FIVE[s][LVL[lv]])) chkFail=`${subjs.join("或")}未達${lv}標`;
    }
    if(chkFail){blocked++;return;}
    // 各篩選階段：取瓶頸差距
    let diffs=[], stTxt=[];
    for(const [subjs,min] of D.sv){
      if(subjs.some(s=>S[s]===null)){diffs=null;break;}
      const sum=subjs.reduce((a,s)=>a+S[s],0);
      diffs&&diffs.push(sum-min);
      stTxt.push(`${subjs.join("+")} ${sum}/${min}（${sum-min>=0?"+":""}${sum-min}）`);
    }
    if(!diffs){blocked++;return;}
    const d=Math.min(...diffs);
    const card={...D, df:d, st:stTxt.join("　")};
    if(d>=2) tiers.safe.push(card);
    else if(d>=-1) tiers.match.push(card);
    else if(d>=-4) tiers.dream.push(card);
    else far++;
  });
  const box=(title,emoji,color,bg,arr,desc)=>{
    arr.sort((a,b)=>a.df-b.df);
    const cards=arr.length?arr.map(c=>`<div class="dcard" style="background:${bg};"><span class="diff" style="color:${color};">${c.df>=0?"+":""}${c.df}</span><b>${c.u}　${c.d}</b><div class="st">去年一階最低篩選：${c.st}</div></div>`).join(""):`<p style="font-size:.82rem; color:#6e6e73;">此帶目前沒有符合的樣本校系。</p>`;
    return `<div class="tierbox"><h2 style="color:${color};">${emoji} ${title}<span style="font-weight:500; font-size:.78rem; color:#6e6e73;">　${desc}</span></h2>${cards}</div>`;
  };
  const techHtml=techBlock(S);
  document.getElementById("out").innerHTML=
    box("夢幻志向","🔥","#c9526f","#fdeef1",tiers.dream,"差 2～4 級分——值得衝，二階備審面試是翻身機會")+
    box("落點志向","🎯","#2f8f6d","#e8f5ee",tiers.match,"±1 級分——主力戰場，志願的核心配置")+
    box("安全志向","🛡","#3d7fc1","#eaf3fb",tiers.safe,"超過 2 級分以上——保心安的底")+
