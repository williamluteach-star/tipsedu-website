<style>

  .a4{max-width:820px; margin:18px auto; background:#fff; padding:34px 42px; box-shadow:0 2px 12px rgba(20,30,60,.12);}

  .rpt-title{text-align:right;}
  .rpt-title h2{font-size:1.15rem; color:#1d1d1f;}
  .rpt-title .sub{font-size:.68rem; color:#5b6478;}
  .stu-row{display:flex; gap:16px; flex-wrap:wrap; margin:10px 0; font-size:.83rem; background:#f5f2ee; border-radius:8px; padding:7px 12px;}
  .stu-row b{color:#5b8fd8;}
  h3.sec{font-size:.95rem; color:#1d1d1f; border-left:5px solid #5b8fd8; padding-left:8px; margin:14px 0 8px;}
  table{width:100%; border-collapse:collapse; font-size:.78rem; margin:6px 0;}
  th,td{border:1px solid #d8deea; padding:4px 8px; text-align:left;}
  th{background:#eaf3fb; color:#1d1d1f;}
  .badge{display:inline-block; background:#1d1d1f; color:#fff; font-weight:800; letter-spacing:4px; border-radius:8px; padding:2px 12px 2px 16px; font-size:1rem;}
  .gap-hi{background:#fdecec; color:#c0392b; font-weight:700;}
  .gap-ok{color:#0a8f43;}
  .verdict{background:#e8f5ee; border-left:5px solid #43a58c; border-radius:8px; padding:7px 12px; font-size:.8rem; margin:8px 0;}
  .warn{background:#fdf6e4; border-left:5px solid #e8a020;}
  .internal{background:#f1f3f7; border:1.5px dashed #8a94a8; border-radius:10px; padding:12px 14px; margin:12px 0;}

    body{background:#fff;}

    th{background:#efefef !important;}
    .gap-hi{background:#f1f1f1 !important;}
  }
</style>
<style id="interp-style">
  .cchip{border:1.5px solid #d2d2d7; background:#fff; color:#3a3a3c; border-radius:980px; padding:5px 13px; font-size:.8rem; cursor:pointer; font-family:inherit; transition:.15s;}

<div class="panel">
  <h1>🔒 TIPS 報告產生器（內部工具，請勿外流網址）<span style="float:right;"><a href="manual.html" style="font-size:.75rem; color:#5b8fd8; text-decoration:none; margin-right:12px;">📘 使用說明</a><a href="sop.html" style="font-size:.75rem; color:#5b8fd8; text-decoration:none;">📖 解讀面談 SOP</a></span></h1>

  <textarea id="codeInput" placeholder="把試算表的結果摘要貼在這裡（可多筆一起貼）…"></textarea>

    <span style="font-size:.83rem; font-weight:700; padding-top:4px;">🎯 職業聚焦（選填，可複選，僅適用①⑤生涯類報告）：</span>
    <div style="flex:1; display:flex; flex-wrap:wrap; gap:6px;" id="careerChips"></div>
  </div>
  <div class="row">
    <label class="mode"><input type="radio" name="mode" value="talk" checked> 面談版（可給家長看）</label>
    <label class="mode"><input type="radio" name="mode" value="internal"> 內部版（含分型與合拍度）</label>
    <label class="mode"><input type="radio" name="mode" value="growth"> 📈 成長軌跡（同一學生歷次測驗，由舊到新貼）</label>
    <button class="btn" onclick="generate()">產生報告</button>
    <button class="btn sec" onclick="window.print()">🖨 列印</button>
  </div>
  <div class="errbox" id="errBox"></div>
</div>

function careerFit(riasec,code){
  const w=[3,2,1]; let num=0, den=0;
  code.split("").forEach((c,i)=>{ num+=riasec[c]*w[i]; den+=40*w[i]; });
  return Math.round(num/den*100);

function gm(riasec,g){ return Math.round(((riasec[g.codes[0]]*2 + riasec[g.codes[1]])/120)*100); }
function esc(s){ return String(s).replace(/[<>&"]/g, c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c])); }
function today(){ return new Date().toLocaleDateString("zh-TW"); }
function radarDual(labels, childVals, parentVals, maxV){
  const n=labels.length, cx=150, cy=140, rMax=95;
  const pt=(i,val)=>{const a=-Math.PI/2+i*(2*Math.PI/n); const r=rMax*Math.max(0,Math.min(1,val)); return [(cx+r*Math.cos(a)).toFixed(1),(cy+r*Math.sin(a)).toFixed(1)];};
  let grid="";
  for(let ring=1;ring<=4;ring++) grid+=`<polygon points="${labels.map((_,i)=>pt(i,ring/4).join(",")).join(" ")}" fill="none" stroke="#dfe6f2"/>`;
  let axes="",lab="";
  labels.forEach((L,i)=>{ const [x,y]=pt(i,1); axes+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#dfe6f2"/>`;
    const [lx,ly]=pt(i,1.28); lab+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="700" fill="${L[1]}">${L[0]} ${childVals[i]}</text>`; });
  const p1=labels.map((_,i)=>pt(i,childVals[i]/maxV).join(",")).join(" ");
  let p2="";
  if(parentVals) p2=`<polygon points="${labels.map((_,i)=>pt(i,parentVals[i]/maxV).join(",")).join(" ")}" fill="rgba(232,135,58,.14)" stroke="#e09a55" stroke-width="2" stroke-dasharray="5 4"/>`;
  return `<svg viewBox="0 0 300 280" width="300" height="280">${grid}${axes}<polygon points="${p1}" fill="rgba(47,111,237,.2)" stroke="#5b8fd8" stroke-width="2.5"/>${p2}${lab}</svg>`;
}
function bar(pct,color){ const w=pct>0?Math.max(pct,3):0; return `<svg viewBox="0 0 100 12" preserveAspectRatio="none" width="100%" height="13" style="display:block;"><rect width="100" height="12" rx="4" fill="#e8ecf4"/>${w?`<rect width="${w}" height="12" rx="4" fill="${color}"/>`:""}</svg>`; }
function spectrum(label,val,maxV,left,right){
  const pct=Math.max(0,Math.min(1,val/maxV));
  const x=8+pct*584;
  return `<div class="spec"><div class="lab">${label}</div>
    <svg viewBox="0 0 600 42" width="100%" style="display:block; max-width:640px;">
      <rect x="8" y="8" width="584" height="9" rx="4.5" fill="#e8ecf4"/>
      <rect x="8" y="8" width="${Math.max(9,pct*584)}" height="9" rx="4.5" fill="#5b8fd8"/>
      <circle cx="${x}" cy="12.5" r="7" fill="#1d1d1f"/>
      <text x="8" y="36" font-size="13" fill="#5b6478">${left}</text>
      <text x="592" y="36" font-size="13" fill="#5b6478" text-anchor="end">${right}</text>
    </svg></div>`;
}

/* 家長風格分析（D,S 各題 0-4；cT 為理念題，可為空） */
function styleBlock(cD, cS, cT, internal, tips){
  const dSum=cD.reduce((a,b)=>a+b,0), sSum=cS.reduce((a,b)=>a+b,0);
  const dMax=cD.length*4, sMax=cS.length*4;
  const tSum=(cT&&cT.length)?cT.reduce((a,b)=>a+b,0):null;
  const spec = spectrum("期待與要求程度", dSum, dMax, "順其自然", "高度要求") +
               spectrum("回應與支持程度", sSum, sMax, "孩子自己來", "高度支持");
  let html=`<h3 class="sec">家長教養互動風格</h3>${spec}`;
  if(internal){
    const hiD=dSum>=dMax*0.55, hiS=sSum>=sMax*0.55;
    const type= hiD&&hiS?"民主威信型":hiD&&!hiS?"專斷型":!hiD&&hiS?"寬容型":"低涉入型";
    const strat={
      "民主威信型":"與機構理念高度相容——直接展示數據與規劃，邀請家長參與目標設定。",
      "專斷型":"先給數據與成績結構，再帶入興趣與適性；避免一開始就挑戰家長的期望。",
      "寬容型":"強調 TIPS 的進度透明與定期回報機制，補足結構面；以孩子的意願為切入點。",
      "低涉入型":"以省心、可信賴為主軸溝通，回報具體、頻率適中，減少要求家長配合的事項。"}[type];
    const base={"民主威信型":88,"專斷型":58,"寬容型":72,"低涉入型":45}[type];
    const supp=cS[1]!==undefined?cS[1]:0;
    let fit=base + supp*3;
    if(tSum!==null) fit += Math.round(tSum*1.5);
    fit=Math.min(100,fit);
    const tipLines=[strat].concat(tips||[]);
    if(cT&&cT.length===2){
      if(cT[0]<=1) tipLines.push("家長偏重短期成績——先講近期成績提升的具體路徑，再帶入長期規劃。");
      if(cT[0]>=3) tipLines.push("家長重視長期培養——可直接以 12 年學習藍圖開場。");
      if(cT[1]>=3) tipLines.push("家長重視數據回報——主動展示 KC 報表與固定回報節奏。");
      if(cT[1]<=1) tipLines.push("家長不偏好盯數據——回報從簡，重點式訊息即可。");
    }
    html+=`<div class="internal"><h4>🔒 內部參考（列印面談版時不會出現）</h4>
      <table><tr><th>教養分型</th><th>要求軸</th><th>回應軸</th>${tSum!==null?"<th>理念契合</th>":""}<th>TIPS 合拍度</th></tr>
      <tr><td><b>${type}</b></td><td>${dSum}/${dMax}</td><td>${sSum}/${sMax}</td>${tSum!==null?`<td>${tSum}/8</td>`:""}<td><b>${fit} / 100</b></td></tr></table>
      <div style="font-size:.76rem; margin-top:6px;"><b>💬 溝通方向：</b><ul style="margin:4px 0 0 18px;">${tipLines.map(t=>`<li>${t}</li>`).join("")}</ul></div></div>`;
  }
  return html;
}

/* ================= 解析 ================= */
function parseCodes(txt){
  const found=[];
  const re=/代碼\[([^\]]+)\]/g; let m;
  while((m=re.exec(txt))!==null) found.push(m[1]);
  // 也接受直接貼裸代碼
  txt.split(/[\n\r]+/).forEach(line=>{
    const t=line.trim();
    if(/^(HSC1|HSP1|HSP2|JHC1|JHP1|JHP2|RDC1|RDP1|RDP2|NSC1|NSP1|NSP2)\|/.test(t) && !found.includes(t)) found.push(t);
  });
  const out={};
  found.forEach(c=>{ let tag=c.split("|")[0]; tag=tag.replace(/2$/,"1"); out[tag]=c; });
  if(Object.keys(out).length===0) parseLegacy(txt,out);
  out.__all=found;
  return out;
}
/* ---- 舊格式相容（改版前的結果摘要，無代碼） ---- */
function parseLegacy(txt,out){
  let m;
  // ① 舊國中：三碼RIA｜D=1.0｜R20 I18 ...｜學術16/32 實作20/32 T=+4
  m=txt.match(/三碼\s*([RIASEC]{3})[\s\S]*?R\s*(\d+)\s*I\s*(\d+)\s*A\s*(\d+)\s*S\s*(\d+)\s*E\s*(\d+)\s*C\s*(\d+)[\s\S]*?學術\s*(\d+)\/32\s*實作\s*(\d+)\/32/);
  if(m){ out.JHC1=`JHC1|（舊資料·姓名見試算表）|—|${m[2]},${m[3]},${m[4]},${m[5]},${m[6]},${m[7]}|${m[8]},${m[9]}`; return; }
  // ③ 舊準備度：就緒指數63/100｜動機16 時間16 專注16 方法16 心態16 獨立16
  m=txt.match(/動機\s*(\d+)\s*時間\s*(\d+)\s*專注\s*(\d+)\s*方法\s*(\d+)\s*心態\s*(\d+)\s*獨立\s*(\d+)/);
  if(m){ out.RDC1=`RDC1|（舊資料·姓名見試算表）|—|${m[1]},${m[2]},${m[3]},${m[4]},${m[5]},${m[6]}`; return; }
  // ④ 舊入班：入班評估｜專注12 語言12 情緒12 自理12 好奇12 ... 英語:xxx
  m=txt.match(/專注\s*(\d+)\s*語言\s*(\d+)\s*情緒\s*(\d+)\s*自理\s*(\d+)\s*好奇\s*(\d+)/);
  if(m){ const bg=(txt.match(/英語[:：]([^｜|]+)/)||[])[1]||""; out.NSC1=`NSC1|（舊資料·姓名見試算表）|—|${m[1]},${m[2]},${m[3]},${m[4]},${m[5]}|${bg.trim()}`; return; }
  // ⑤ 舊高中：何倫碼IRA｜D值12｜選組指數88（自然30/社會8）→ 六型分數不足，產簡化版
  m=txt.match(/何倫碼\s*([RIASEC]{3})[\s\S]*?選組(?:指數)?\s*(\d+)（?自然\s*(\d+)\/?社會\s*(\d+)/);
  if(m){ out.HSLEGACY={code3:m[1], idx:Number(m[2]), nat:Number(m[3]), hum:Number(m[4]), D:(txt.match(/D值?\s*=?\s*([\d.]+)/)||[])[1]||"—"}; return; }
}

function riasecSection(riasec, pA, top3code){
  const labels=R6.map(k=>[k, {R:"#e0798c",I:"#8b7cd8",A:"#e09a55",S:"#43a58c",E:"#5b8fd8",C:"#b0895a"}[k]]);
  const childVals=R6.map(k=>riasec[k]);
  const parentVals=pA?pA.map(v=>v*10):null;
  let table="";
  if(pA){
    const rows=R6.map((k,i)=>{
      const gap=pA[i]*10-riasec[k];
      const cls=Math.abs(gap)>=12?"gap-hi":(Math.abs(gap)<=6?"gap-ok":"");
      const note=Math.abs(gap)>=12?(gap>0?"家長高估":"家長低估"):(Math.abs(gap)<=6?"一致":"");
      return `<tr><td>${R6NAME[k]}</td><td>${riasec[k]}</td><td>${pA[i]*10}</td><td class="${cls}">${gap>0?"+":""}${gap} ${note}</td></tr>`;

    const biggest=R6.map((k,i)=>({k,g:pA[i]*10-riasec[k]})).sort((a,b)=>Math.abs(b.g)-Math.abs(a.g))[0];

    table=`<table><tr><th>類型</th><th>孩子實測(0-40)</th><th>家長觀察(換算)</th><th>落差</th></tr>${rows}</table>${hint}`;

  return `<h3 class="sec">興趣六型剖面${pA?"：孩子實測 vs 家長眼中的孩子":""}（何倫碼 <span class="badge">${top3code}</span>）</h3>

function detailTable(title, rows){
  if(!rows.length) return "";

function itemsRows(items, opts, ansStr, offset, hiFrom){
  const rows=[];
  for(let i=0;i<items.length;i++){
    const v=Number(ansStr[offset+i]);
    if(Number.isNaN(v)) continue;
    const txt=Array.isArray(items[i])?items[i][1]:items[i];
    const hi=(hiFrom!==undefined && v>=hiFrom);
    rows.push([offset+i+1, txt, opts[v]!==undefined?opts[v]:v, hi?'#c0392b':null]);
  }
  return rows;
}
function pairRows(txts, vals, opts){
  return txts.map((t,i)=> (vals && vals[i]!==undefined)?[i+1, t, opts[vals[i]]!==undefined?opts[vals[i]]:vals[i], null]:null).filter(Boolean);
}

    ? `家長低估孩子的「${R6NAME[g.k]}」——面談時安排孩子親口談這方面的經驗或展示成果。`

function gwParse(c){
  const seg=c.split("|"); const tag=seg[0].replace(/2$/,"1");
  if(tag==="NSC1"){ const v=seg[3].split(",").map(Number);
    return {tag, stage:1, label:"新生入班評估", grade:seg[2], name:seg[1],
      key:`五面向：專注${v[0]} 語言${v[1]} 情緒${v[2]} 自理${v[3]} 好奇${v[4]}（各0-18）`}; }
  if(tag==="RDC1"){ const v=seg[3].split(",").map(Number); const idx=Math.round(v.reduce((a,b)=>a+b,0)/192*100);
    return {tag, stage:2, label:"國中準備度檢測", grade:seg[2], name:seg[1], rd:v, idx,
      key:`就緒指數 ${idx}/100｜最弱：${RD_DIMS[v.indexOf(Math.min(...v))][1]}`}; }
  if(tag==="JHC1"){ const v=seg[3].split(",").map(Number); const riasec={}; R6.forEach((k,i)=>riasec[k]=v[i]);
    const sorted=R6.slice().sort((a,b)=>riasec[b]-riasec[a]||R6.indexOf(a)-R6.indexOf(b));
    const [ac,pr]=seg[4].split(",").map(Number);
    return {tag, stage:3, label:"生涯興趣測驗（國中）", grade:seg[2], name:seg[1], riasec, code3:sorted.slice(0,3).join(""),
      key:`何倫碼 ${sorted.slice(0,3).join("")}｜T=${pr-ac}（${pr-ac>=8?"偏技高":pr-ac<=-8?"偏普高":"中間帶"}）`}; }
  if(tag==="HSC1"){ const v=seg[3].split(",").map(Number); const riasec={}; R6.forEach((k,i)=>riasec[k]=v[i]);
    const sorted=R6.slice().sort((a,b)=>riasec[b]-riasec[a]||R6.indexOf(a)-R6.indexOf(b));
    const [nat,hum]=seg[4].split(",").map(Number); const idx=Math.round(50+(nat-hum)*50/32);
    const top=HS_GROUPS.map(g=>({n:g.n,pct:gm(riasec,g)})).sort((a,b)=>b.pct-a.pct)[0];
    return {tag, stage:4, label:"高中生涯定向測驗", grade:seg[2], name:seg[1], riasec, code3:sorted.slice(0,3).join(""),
      key:`何倫碼 ${sorted.slice(0,3).join("")}｜選組指數 ${idx}｜學群首選：${top.n} ${top.pct}%`}; }
  return null;
}

    const first=hCodes[0].code3, last=hCodes[hCodes.length-1].code3;
    const stable= first[0]===last[0] ? (first.slice(0,2)===last.slice(0,2)?"前兩碼一致——興趣高度穩定，方向值得重押":"首碼一致——核心興趣穩定")
                 : (last.includes(first[0])?"首碼仍在前三——興趣微調中，屬正常發展":"首碼改變——興趣仍在探索，建議以最近一次為主並持續驗證");
    body+=`<h3 class="sec">何倫碼穩定性</h3>
      <div style="display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin:6px 0;">
        ${hCodes.map(p=>`<div style="text-align:center;"><div class="badge">${p.code3}</div><div style="font-size:.68rem; color:#5b6478; margin-top:3px;">${p.label.replace("測驗","").replace("（國中）","")}<br>${esc(p.grade)}</div></div>`).join('<div style="font-size:1.2rem; color:#8a94a8;">→</div>')}
      </div><div class="verdict">📌 ${stable}</div>`;
    // RIASEC 疊圖（最早 vs 最新）
    const a=hCodes[0], b=hCodes[hCodes.length-1];
    const labels=R6.map(k=>[k,{R:"#e0798c",I:"#8b7cd8",A:"#e09a55",S:"#43a58c",E:"#5b8fd8",C:"#b0895a"}[k]]);
    body+=`<div class="flex"><div style="text-align:center;">${radarDual(labels,R6.map(k=>b.riasec[k]),R6.map(k=>a.riasec[k]),40)}
      <div class="legend">─ <span class="c1">${b.label}（${esc(b.grade)}）</span>　╌ <span class="c2">${a.label}（${esc(a.grade)}）</span></div></div>
      <div><table><tr><th>類型</th><th>${esc(a.grade)}</th><th>${esc(b.grade)}</th><th>變化</th></tr>
      ${R6.map(k=>{const d=b.riasec[k]-a.riasec[k]; return `<tr><td>${R6NAME[k]}</td><td>${a.riasec[k]}</td><td>${b.riasec[k]}</td><td class="${Math.abs(d)>=8?'gap-hi':''}">${d>0?"+":""}${d}</td></tr>`;}).join("")}
      </table></div></div>`;
  }
  // 準備度前後測
  const rds=parsed.filter(p=>p.rd);
  if(rds.length>=2){
    const a=rds[0], b=rds[rds.length-1];
    const labels=RD_DIMS.map(d=>[d[3],d[2]]);
    body+=`<h3 class="sec">準備度前後測（就緒指數 ${a.idx} → ${b.idx}，${b.idx-a.idx>=0?"+":""}${b.idx-a.idx}）</h3>
      <div class="flex"><div style="text-align:center;">${radarDual(labels,b.rd,a.rd,32)}
      <div class="legend">─ <span class="c1">後測（${esc(b.grade)}）</span>　╌ <span class="c2">前測（${esc(a.grade)}）</span></div></div>
      <div><table><tr><th>能力</th><th>前測</th><th>後測</th><th>變化</th></tr>
      ${RD_DIMS.map((d,i)=>{const df=b.rd[i]-a.rd[i]; return `<tr><td>${d[1]}</td><td>${a.rd[i]}</td><td>${b.rd[i]}</td><td class="${df>=4?'gap-ok':(df<=-4?'gap-hi':'')}">${df>0?"+":""}${df}</td></tr>`;}).join("")}
      </table><div class="verdict">${b.idx-a.idx>=5?"✔ 整體就緒度明顯提升——把進步最大的向度說給孩子聽，強化自我效能。":(b.idx-a.idx<=-5?"⚠ 就緒度下滑——面談時先了解這段期間發生什麼（課業壓力、作息、環境變動）。":"整體持平——聚焦個別向度的消長。")}</div></div>`;
  }
  if(internal) body+=`<div class="internal"><h4>🔒 內部備註</h4><p style="font-size:.76rem;">縱貫比較的前提是「同一工具、同一填答者」；跨工具（如入班評估 vs 準備度）僅作時間軸敘事，不做分數比較。孩子的分數變化 ±4 以內視為測量誤差範圍。</p></div>`;
  return rptShell("12 年學習藍圖・成長軌跡報告",
    `<span>學生：<b>${esc(name)}</b></span><span>測評次數：<b>${parsed.length}</b></span><span>期間：<b>${esc(parsed[0].grade)} → ${esc(parsed[parsed.length-1].grade)}</b></span>`, body);
}
/* ================= 主流程 ================= */
function generate(){
  window.__careerSel=[...document.querySelectorAll(".cchip.on")].map(b=>+b.dataset.i);
  const err=document.getElementById("errBox"); err.style.display="none";
  const codes=parseCodes(document.getElementById("codeInput").value);
  const modeVal=document.querySelector('input[name="mode"]:checked').value;
  const internal=modeVal==="internal";
  let html="";
  try{
    if(modeVal==="growth"){
      html=renderGrowth(codes.__all||[], true);
      if(!html){ err.textContent="成長軌跡需要同一位學生至少 2 筆不同時間的測驗代碼（由舊到新貼上「已完成」那幾筆的結果摘要）。"; err.style.display="block"; return; }
    }
    else if(codes.HSC1) html=renderHS(codes.HSC1, codes.HSP1||null, internal);
    else if(codes.HSLEGACY) html=renderHSLegacy(codes.HSLEGACY);
    else if(codes.JHC1) html=renderJH(codes.JHC1, codes.JHP1||null, internal);
    else if(codes.RDC1) html=renderRD(codes.RDC1, codes.RDP1||null, internal);
    else if(codes.NSC1) html=renderNS(codes.NSC1, codes.NSP1||null, internal);
    else { err.textContent="找不到有效的報告代碼——請確認貼的是試算表「結果摘要」欄的完整內容（要包含「代碼[…]」）。"; err.style.display="block"; return; }
  }catch(e){
    err.textContent="代碼格式解析失敗："+e.message; err.style.display="block"; return;
  }
  document.getElementById("report").innerHTML=html;
  window.scrollTo(0,document.querySelector(".a4").offsetTop-10);
  /* 存 PDF 檔名自動化：學生姓名_報告名_日期（列印/另存 PDF 時的預設檔名） */
  try{
    const rpt=document.querySelector(".a4");
    const stuName=(rpt.querySelector(".stu-row b")||{}).textContent||"";
    const rptName=(rpt.querySelector(".rpt-title h2")||{}).textContent||"報告";
    const d=new Date(); const ds=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
    const mTag= modeVal==="internal"?"內部版": modeVal==="growth"?"":"面談版";
    document.title=`${stuName}_${rptName}${mTag?"_"+mTag:""}_${ds}`.replace(/[\\/:*?"<>|＋+]/g,"_");
  }catch(e){}
}
</script>
</body>
</html>
