</div>

function gm(riasec,g){ return Math.round(((riasec[g.codes[0]]*2 + riasec[g.codes[1]])/120)*100); }
function esc(s){ return String(s).replace(/[<>&"]/g, c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c])); }
function today(){ return new Date().toLocaleDateString("zh-TW"); }
function radarDual(labels, childVals, parentVals, maxV){
  const n=labels.length, cx=150, cy=140, rMax=95;
  const pt=(i,val)=>{const a=-Math.PI/2+i*(2*Math.PI/n); const r=rMax*Math.max(0,Math.min(1,val)); return [(cx+r*Math.cos(a)).toFixed(1),(cy+r*Math.sin(a)).toFixed(1)];};
  let grid="";
  for(let ring=1;ring<=4;ring++) grid+=`<polygon points="${labels.map((_,i)=>pt(i,ring/4).join(",")).join(" ")}" fill="none" stroke="#dfe6f2"/>`;
  let axes="",lab="";
  labels.forEach((L,i)=>{ const [x,y]=pt(i,1); axes+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#dfe6f2"/>`;
    const [lx,ly]=pt(i,1.28); lab+=`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="10.5" font-weight="700" fill="${L[1]}">${L[0]} ${childVals[i]}</text>`; });
  const p1=labels.map((_,i)=>pt(i,childVals[i]/maxV).join(",")).join(" ");
  let p2="";
  if(parentVals) p2=`<polygon points="${labels.map((_,i)=>pt(i,parentVals[i]/maxV).join(",")).join(" ")}" fill="rgba(232,135,58,.14)" stroke="#e8873a" stroke-width="2" stroke-dasharray="5 4"/>`;
  return `<svg viewBox="0 0 300 280" width="300" height="280">${grid}${axes}<polygon points="${p1}" fill="rgba(47,111,237,.2)" stroke="#2f6fed" stroke-width="2.5"/>${p2}${lab}</svg>`;
}

/* ================= 解析 ================= */
function parseCodes(txt){
  const found=[];
  const re=/代碼\[([^\]]+)\]/g; let m;
  while((m=re.exec(txt))!==null) found.push(m[1]);
  // 也接受直接貼裸代碼
  txt.split(/[\n\r]+/).forEach(line=>{
    const t=line.trim();
    if(/^(HSC1|HSP1|JHC1|JHP1|RDC1|RDP1|NSC1)\|/.test(t) && !found.includes(t)) found.push(t);
  });
  const out={};
  found.forEach(c=>{ const tag=c.split("|")[0]; out[tag]=c; });
  if(Object.keys(out).length===0) parseLegacy(txt,out);
  return out;
}
/* ---- 舊格式相容（改版前的結果摘要，無代碼） ---- */
function parseLegacy(txt,out){
  let m;
  // ① 舊國中：三碼RIA｜D=1.0｜R20 I18 ...｜學術16/32 實作20/32 T=+4
  m=txt.match(/三碼\s*([RIASEC]{3})[\s\S]*?R\s*(\d+)\s*I\s*(\d+)\s*A\s*(\d+)\s*S\s*(\d+)\s*E\s*(\d+)\s*C\s*(\d+)[\s\S]*?學術\s*(\d+)\/32\s*實作\s*(\d+)\/32/);
  if(m){ out.JHC1=`JHC1|（舊資料·姓名見試算表）|—|${m[2]},${m[3]},${m[4]},${m[5]},${m[6]},${m[7]}|${m[8]},${m[9]}`; return; }
  // ③ 舊準備度：就緒指數63/100｜動機16 時間16 專注16 方法16 心態16 獨立16
  m=txt.match(/動機\s*(\d+)\s*時間\s*(\d+)\s*專注\s*(\d+)\s*方法\s*(\d+)\s*心態\s*(\d+)\s*獨立\s*(\d+)/);
  if(m){ out.RDC1=`RDC1|（舊資料·姓名見試算表）|—|${m[1]},${m[2]},${m[3]},${m[4]},${m[5]},${m[6]}`; return; }
  // ④ 舊入班：入班評估｜專注12 語言12 情緒12 自理12 好奇12 ... 英語:xxx
  m=txt.match(/專注\s*(\d+)\s*語言\s*(\d+)\s*情緒\s*(\d+)\s*自理\s*(\d+)\s*好奇\s*(\d+)/);
  if(m){ const bg=(txt.match(/英語[:：]([^｜|]+)/)||[])[1]||""; out.NSC1=`NSC1|（舊資料·姓名見試算表）|—|${m[1]},${m[2]},${m[3]},${m[4]},${m[5]}|${bg.trim()}`; return; }
  // ⑤ 舊高中：何倫碼IRA｜D值12｜選組指數88（自然30/社會8）→ 六型分數不足，產簡化版
  m=txt.match(/何倫碼\s*([RIASEC]{3})[\s\S]*?選組(?:指數)?\s*(\d+)（?自然\s*(\d+)\/?社會\s*(\d+)/);
  if(m){ out.HSLEGACY={code3:m[1], idx:Number(m[2]), nat:Number(m[3]), hum:Number(m[4]), D:(txt.match(/D值?\s*=?\s*([\d.]+)/)||[])[1]||"—"}; return; }
}

     <div class="flex"><div style="text-align:center;">${radarDual(labels,vals,parentVals,32)}<div class="legend">─ <span class="c1">孩子自評</span>${pA?"　╌ <span class='c2'>家長觀察</span>":""}</div></div><div>${table}</div></div>`+
    planBlock+
    (pc?styleBlock(pC.slice(0,2),pC.slice(2),internal,4):"");
  return rptShell("國中準備度檢測報告"+(pc?"＋親子對照":""),
    `<span>學生：<b>${esc(name)}</b></span><span>年級：<b>${esc(grade)}</b></span><span>就緒指數：<b>${index}/100</b></span>${pc?"":"<span style='color:#c0392b;'>（未填對照卷）</span>"}`, body);
}

function renderNS(cc){
  const seg=cc.split("|");
  const name=seg[1], grade=seg[2];
  const vals=seg[3].split(",").map(Number);
  const bg=seg[4]||"";
  const labels=NS_DIMS.map(d=>[d[1].slice(0,2), d[2]]);
  const rows=NS_DIMS.map((d,i)=>{
    const lv=vals[i]>=14?["亮點優勢","#12b5a5"]:(vals[i]>=9?["穩定發展","#e8873a"]:["慢慢來","#e05d5d"]);
    return `<tr><td>${d[1]}</td><td>${vals[i]}/18</td><td style="color:${lv[1]}; font-weight:700;">${lv[0]}</td></tr>`;}).join("");
  const body=
    `<h3 class="sec">五大發展面向（家長觀察填答）</h3>
     <div class="flex"><div style="text-align:center;">${radarDual(labels,vals,null,18)}<div class="legend">─ <span class="c1">家長觀察</span></div></div>
     <div><table><tr><th>面向</th><th>分數</th><th>階段</th></tr>${rows}</table></div></div>
     <h3 class="sec">英語與學習背景</h3><div class="verdict">${esc(bg)||"（未填）"}</div>`;
  return rptShell("新生入班評估報告",
    `<span>孩子：<b>${esc(name)}</b></span><span>年段：<b>${esc(grade)}</b></span><span>填答：<b>家長</b></span>`, body);
}

/* ================= 主流程 ================= */
function generate(){
  const err=document.getElementById("errBox"); err.style.display="none";
  const codes=parseCodes(document.getElementById("codeInput").value);
  const internal=document.querySelector('input[name="mode"]:checked').value==="internal";
  let html="";
  try{
    if(codes.HSC1) html=renderHS(codes.HSC1, codes.HSP1||null, internal);
    else if(codes.HSLEGACY) html=renderHSLegacy(codes.HSLEGACY);
    else if(codes.JHC1) html=renderJH(codes.JHC1, codes.JHP1||null, internal);
    else if(codes.RDC1) html=renderRD(codes.RDC1, codes.RDP1||null, internal);
    else if(codes.NSC1) html=renderNS(codes.NSC1);
    else { err.textContent="找不到有效的報告代碼——請確認貼的是試算表「結果摘要」欄的完整內容（要包含「代碼[…]」）。"; err.style.display="block"; return; }
  }catch(e){
    err.textContent="代碼格式解析失敗："+e.message; err.style.display="block"; return;
  }
  document.getElementById("report").innerHTML=html;
  window.scrollTo(0,document.querySelector(".a4").offsetTop-10);
}
</script>
